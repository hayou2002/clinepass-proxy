version: '3.8'

services:
  clinepass-proxy:
    build: .
    container_name: clinepass-proxy
    restart: unless-stopped
    ports:
      - "55991:55991"
    environment:
      - API_KEY=${API_KEY:-}
    command: ["-api-key", "${API_KEY:-}", "-host", "0.0.0.0", "-port", "55991", "-thinking-lang", "zh"]